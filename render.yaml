services:
  - type: web
    name: baptiste-fort-cv-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ALLOWED_ORIGINS
        value: https://fortbaptiste.github.io
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: OPENAI_API_KEY
        sync: false
